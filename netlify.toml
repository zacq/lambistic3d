# ══════════════════════════════════════════════════════════
# Netlify configuration — 28 Commandments landing page
# Static site, no build step required
# ══════════════════════════════════════════════════════════

[build]
  publish = "."          # root is the publish directory
  # No build command — pure HTML/CSS/JS

# ── Security & performance headers ────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Long-term cache for animation frame images ─────────────
# These files are hashed by filename (ezgif-frame-XXX.jpg)
# and never change, so we cache them aggressively.
[[headers]]
  for = "/hero/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sction1/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache CSS/JS with short revalidation ──────────────────
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ── HTML — no caching so updates deploy immediately ────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirects ──────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
